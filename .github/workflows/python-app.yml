name: 构建并发布可执行文件

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '指定tag（留空自动取最新）'
        required: false
        type: string
      create_release:
        description: '是否创建Release'
        required: true
        default: true
        type: boolean

env:
  PYTHON_VERSION: "3.10"
  PROJECT_NAME: "ad"

jobs:
# ========================
# 版本解析
# ========================
  meta:
    name: 解析版本
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
              TAG="${{ github.event.inputs.tag_name }}"
            else
              TAG=$(git tag -l "v*" --sort=-v:refname | head -n1)
            fi
          else
            TAG="${{ github.ref_name }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "没有找到tag"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "使用tag: $TAG"

      - name: 提取版本号
        id: ver
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本: $VERSION"

# ========================
# 构建（矩阵）
# ========================
  build:
    name: 构建 (${{ matrix.os }})
    needs: meta
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: ".exe"
          - os: ubuntu-latest
            name: linux
            ext: ""
          - os: macos-latest
            name: macos
            ext: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      # ✅ Python
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ✅ pip缓存（关键优化）
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # ✅ 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ✅ 构建
      - name: 打包
        run: |
          pyinstaller --onefile \
            --name "${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}" \
            main.py

      # ✅ SHA256
      - name: 生成校验
        shell: bash
        run: |
          cd dist
          FILE="${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}${{ matrix.ext }}"
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            certutil -hashfile "$FILE" SHA256 | findstr /v "hash" > "$FILE.sha256"
          else
            shasum -a 256 "$FILE" > "$FILE.sha256"
          fi

          cat "$FILE.sha256"

      # ✅ 上传 artifact
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: dist/*

# ========================
# 发布 Release（推荐方式）
# ========================
  release:
    name: 发布 Release
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ✅ 展平目录（关键）
      - name: 整理文件
        run: |
          mkdir release
          find artifacts -type f -exec mv {} release/ \;
          ls -lh release

      # ✅ 生成总校验文件
      - name: 汇总SHA256
        run: |
          cd release
          echo "# SHA256 Checksums" > checksums.txt
          for f in *; do
            if [[ "$f" != *.sha256 && "$f" != "checksums.txt" ]]; then
              if [[ -f "$f.sha256" ]]; then
                cat "$f.sha256" >> checksums.txt
              else
                shasum -a 256 "$f" >> checksums.txt
              fi
            fi
          done

          cat checksums.txt

      # ✅ 发布（核心最佳实践）
      - name: 发布到 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          VERSION="${{ needs.meta.outputs.version }}"

          gh release create "$TAG" \
            --title "Release $VERSION" \
            --notes "自动构建版本 $VERSION" \
            ./release/*
