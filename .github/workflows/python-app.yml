name: 构建并发布可执行文件

on:
  # 推送v开头的标签时自动触发
  push:
    tags: ['v*']
  
  # 支持手动触发
  workflow_dispatch:
    inputs:
      tag_name:
        description: '选择要构建的标签（留空则使用最新标签）'
        required: false
        type: string
      create_release:
        description: '是否创建Release'
        required: true
        default: true
        type: boolean
      prerelease:
        description: '是否为预发布版本'
        required: true
        default: false
        type: boolean

jobs:
  # 获取版本信息
  get-version:
    name: 获取版本信息
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag_name: ${{ steps.get_tag.outputs.tag_name }}
      is_manual: ${{ steps.check_trigger.outputs.is_manual }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有标签
      
      - name: 检查触发方式
        id: check_trigger
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "is_manual=true" >> $GITHUB_OUTPUT
            echo "手动触发模式"
          else
            echo "is_manual=false" >> $GITHUB_OUTPUT
            echo "标签推送模式"
          fi
      
      - name: 获取标签名
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 手动触发模式
            if [ -n "${{ github.event.inputs.tag_name }}" ]; then
              # 使用指定的标签
              TAG_NAME="${{ github.event.inputs.tag_name }}"
            else
              # 获取最新的v*标签
              TAG_NAME=$(git tag -l "v*" --sort=-v:refname | head -n1)
              if [ -z "$TAG_NAME" ]; then
                echo "错误：没有找到v*标签"
                exit 1
              fi
            fi
          else
            # 标签推送模式
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "使用的标签: $TAG_NAME"
      
      - name: 检出指定标签
        run: |
          git checkout ${{ steps.get_tag.outputs.tag_name }}
      
      - name: 提取版本号
        id: extract
        run: |
          # 从标签名中提取版本号（去掉v前缀）
          VERSION="${{ steps.get_tag.outputs.tag_name }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"
      
      - name: 从CHANGELOG提取更新日志
        id: extract_changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            # 提取当前版本对应的更新日志
            NOTES=$(awk -v ver="$VERSION" '
              BEGIN { flag=0 }
              /^## / {
                if ($0 ~ ver || $0 ~ "v" ver) flag=1; 
                else if (flag) exit
              }
              flag { print }
            ' CHANGELOG.md)
            
            if [ -z "$NOTES" ]; then
              NOTES="暂无更新说明"
            fi
            
            # 将多行文本转换为单行（用于输出）
            NOTES_ESCAPED="${NOTES//'%'/'%25'}"
            NOTES_ESCAPED="${NOTES_ESCAPED//$'\n'/'%0A'}"
            NOTES_ESCAPED="${NOTES_ESCAPED//$'\r'/'%0D'}"
            
            echo "release_notes=$NOTES_ESCAPED" >> $GITHUB_OUTPUT
          else
            echo "release_notes=暂无更新说明" >> $GITHUB_OUTPUT
          fi

  # 构建Windows版本
  build-windows:
    name: Windows构建 (${{ needs.get-version.outputs.tag_name }})
    runs-on: windows-latest
    needs: get-version
    if: always()  # 即使get-version完成就执行
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.get-version.outputs.tag_name }}
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-windows-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 生成SHA256校验和
      run: |
        cd dist
        certutil -hashfile "ad-windows-${{ needs.get-version.outputs.version }}.exe" SHA256 > "ad-windows-${{ needs.get-version.outputs.version }}.exe.sha256"
        type "ad-windows-${{ needs.get-version.outputs.version }}.exe.sha256"
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable-${{ needs.get-version.outputs.version }}
        path: |
          dist/ad-windows-${{ needs.get-version.outputs.version }}.exe
          dist/ad-windows-${{ needs.get-version.outputs.version }}.exe.sha256
  
  # 构建Linux版本
  build-linux:
    name: Linux构建 (${{ needs.get-version.outputs.tag_name }})
    runs-on: ubuntu-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.get-version.outputs.tag_name }}
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-linux-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 生成SHA256校验和
      run: |
        cd dist
        sha256sum "ad-linux-${{ needs.get-version.outputs.version }}" > "ad-linux-${{ needs.get-version.outputs.version }}.sha256"
        cat "ad-linux-${{ needs.get-version.outputs.version }}.sha256"
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: linux-executable-${{ needs.get-version.outputs.version }}
        path: |
          dist/ad-linux-${{ needs.get-version.outputs.version }}
          dist/ad-linux-${{ needs.get-version.outputs.version }}.sha256
  
  # 构建macOS版本
  build-macos:
    name: macOS构建 (${{ needs.get-version.outputs.tag_name }})
    runs-on: macos-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.get-version.outputs.tag_name }}
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-macos-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 生成SHA256校验和
      run: |
        cd dist
        shasum -a 256 "ad-macos-${{ needs.get-version.outputs.version }}" > "ad-macos-${{ needs.get-version.outputs.version }}.sha256"
        cat "ad-macos-${{ needs.get-version.outputs.version }}.sha256"
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: macos-executable-${{ needs.get-version.outputs.version }}
        path: |
          dist/ad-macos-${{ needs.get-version.outputs.version }}
          dist/ad-macos-${{ needs.get-version.outputs.version }}.sha256
  
  # 创建Release
  create-release:
    name: 创建Release
    needs: [get-version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 只有手动触发了创建Release或者标签推送模式才执行
    if: |
      (github.event_name == 'push') || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    
    steps:
    - name: 下载Windows构建产物
      uses: actions/download-artifact@v4
      with:
        name: windows-executable-${{ needs.get-version.outputs.version }}
        path: release/
    
    - name: 下载Linux构建产物
      uses: actions/download-artifact@v4
      with:
        name: linux-executable-${{ needs.get-version.outputs.version }}
        path: release/
    
    - name: 下载macOS构建产物
      uses: actions/download-artifact@v4
      with:
        name: macos-executable-${{ needs.get-version.outputs.version }}
        path: release/
    
    - name: 准备Release文件
      run: |
        cd release
        echo "Release文件列表："
        ls -la
        
        # 创建校验和汇总文件
        cat *.sha256 > checksums.txt 2>/dev/null || true
    
    - name: 创建Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ needs.get-version.outputs.version }}
        tag_name: ${{ needs.get-version.outputs.tag_name }}
        body: |
          ## 🎉 ${{ github.event_name == 'workflow_dispatch' && '手动构建' || '自动构建' }}的Release v${{ needs.get-version.outputs.version }}
          
          ### 📦 包含文件
          - **Windows**: `ad-windows-${{ needs.get-version.outputs.version }}.exe`
          - **Linux**: `ad-linux-${{ needs.get-version.outputs.version }}`
          - **macOS**: `ad-macos-${{ needs.get-version.outputs.version }}`
          
          ### 🔍 校验文件
          每个文件都提供了对应的SHA256校验文件（.sha256后缀）
          
          ### 📝 更新内容
          ${{ needs.get-version.outputs.release_notes || '暂无更新说明' }}
          
          ### ⚙️ 使用方法
          **Windows**: 直接双击运行 `ad-windows-${{ needs.get-version.outputs.version }}.exe`
          
          **Linux/macOS**: 
          ```bash
          # 添加执行权限
          chmod +x ad-linux-${{ needs.get-version.outputs.version }}
          # 运行
          ./ad-linux-${{ needs.get-version.outputs.version }}
