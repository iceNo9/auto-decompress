name: 构建并发布可执行文件（高级版）

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '指定tag（留空自动取最新）'
        required: false
        type: string
      create_release:
        description: '是否创建Release'
        required: true
        default: true
        type: boolean

env:
  PYTHON_VERSION: "3.10"
  PROJECT_NAME: "ad"

jobs:
# ========================
# 版本 + Changelog
# ========================
  meta:
    name: 解析版本
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
      notes: ${{ steps.changelog.outputs.notes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须，不然拿不到历史

      - name: 获取tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
              TAG="${{ github.event.inputs.tag_name }}"
            else
              TAG=$(git tag -l "v*" --sort=-v:refname | head -n1)
            fi
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 提取版本号
        id: ver
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ✅ 自动 changelog（核心）
      - name: 生成 Changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -A1 "^$TAG$" | tail -n1)

          if [[ -z "$PREV" || "$PREV" == "$TAG" ]]; then
            NOTES=$(git log --pretty=format:"- %s" -n 20)
          else
            NOTES=$(git log "$PREV..$TAG" --pretty=format:"- %s")
          fi

          echo "生成日志:"
          echo "$NOTES"

          NOTES_ESCAPED="${NOTES//'%'/'%25'}"
          NOTES_ESCAPED="${NOTES_ESCAPED//$'\n'/'%0A'}"
          NOTES_ESCAPED="${NOTES_ESCAPED//$'\r'/'%0D'}"

          echo "notes=$NOTES_ESCAPED" >> $GITHUB_OUTPUT

# ========================
# 构建（Nuitka）
# ========================
  build:
    name: 构建 (${{ matrix.os }})
    needs: meta
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: ".exe"
          - os: ubuntu-latest
            name: linux
            ext: ""
          - os: macos-latest
            name: macos
            ext: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ✅ pip cache
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      # ✅ Nuitka 构建（核心）
      - name: Nuitka 打包
        shell: bash
        run: |
          python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --output-filename="${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}${{ matrix.ext }}" \
            main.py

      - name: 生成 SHA256
        shell: bash
        run: |
          FILE="${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}${{ matrix.ext }}"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            certutil -hashfile "$FILE" SHA256 > tmp.txt
            tail -n 1 tmp.txt > "$FILE.sha256"
          else
            shasum -a 256 "$FILE" > "$FILE.sha256"
          fi

          cat "$FILE.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            ${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}*
            *.sha256

# ========================
# Release（自动覆盖）
# ========================
  release:
    name: 发布 Release
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理文件
        run: |
          mkdir release
          find artifacts -type f -exec mv {} release/ \;
          rm -f release/tmp.txt
          ls -lh release

      - name: 生成 checksums
        run: |
          cd release
          echo "# SHA256 Checksums" > checksums.txt
          for f in *; do
            if [[ "$f" != *.sha256 && "$f" != "checksums.txt" ]]; then
              if [[ -f "$f.sha256" ]]; then
                cat "$f.sha256" >> checksums.txt
              else
                shasum -a 256 "$f" >> checksums.txt
              fi
            fi
          done

      # ✅ 自动创建或覆盖
      - name: 发布 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          VERSION="${{ needs.meta.outputs.version }}"
          NOTES="${{ needs.meta.outputs.notes }}"

          # 如果存在就更新，不存在就创建
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release 已存在，更新..."
            gh release edit "$TAG" \
              --title "Release $VERSION" \
              --notes "$NOTES"
          else
            echo "创建 Release..."
            gh release create "$TAG" \
              --title "Release $VERSION" \
              --notes "$NOTES"
          fi

          # 强制覆盖上传文件
          gh release upload "$TAG" ./release/* --clobber
