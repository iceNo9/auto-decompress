name: 构建并发布可执行文件

on:
  push:
    tags: ['v*']  # 推送v开头的标签时触发

jobs:
  # 提取版本号
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: 提取版本号
        id: extract
        run: |
          # 从标签名中提取版本号（去掉v前缀）
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

  build-windows:
    name: Windows构建
    runs-on: windows-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-windows-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: dist/ad-windows-*.exe
  
  build-linux:
    name: Linux构建
    runs-on: ubuntu-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-linux-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: linux-executable
        path: dist/ad-linux-*
  
  build-macos:
    name: macOS构建
    runs-on: macos-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-macos-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: macos-executable
        path: dist/ad-macos-*
  
  create-release:
    name: 创建Release并上传文件
    needs: [get-version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限才能创建Release
    
    steps:
    - name: 下载所有构建产物
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: 查看下载的文件
      run: |
        ls -la artifacts/
        ls -la artifacts/*/*
    
    - name: 创建Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ needs.get-version.outputs.version }}
        tag_name: ${{ github.ref_name }}
        body: |
          ## 自动构建的Release
            
          ### 版本信息
          - 版本号: ${{ needs.get-version.outputs.version }}
          - 标签: ${{ github.ref_name }}
          - 构建时间: ${{ github.event.repository.updated_at }}
            
          ### 包含文件
          - Windows: `ad-windows-${{ needs.get-version.outputs.version }}.exe`
          - Linux: `ad-linux-${{ needs.get-version.outputs.version }}`
          - macOS: `ad-macos-${{ needs.get-version.outputs.version }}`
            
          ### 更新内容
          <!-- 这里可以写更新说明，或者从CHANGELOG.md自动提取 -->
            
          ### 安装说明
          1. 下载对应系统的文件
          2. 给文件添加执行权限（Linux/macOS需要）
          3. 直接运行即可
          
          **注意**：如果遇到权限问题，请使用 `chmod +x` 命令添加执行权限。
        draft: false
        prerelease: false
        files: |
          artifacts/windows-executable/ad-windows-${{ needs.get-version.outputs.version }}.exe
          artifacts/linux-executable/ad-linux-${{ needs.get-version.outputs.version }}
          artifacts/macos-executable/ad-macos-${{ needs.get-version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 输出Release信息
      run: |
        echo "Release已创建: ${{ steps.create_release.outputs.url }}"
