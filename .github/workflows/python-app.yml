name: 构建并发布可执行文件（PyInstaller）

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '指定tag（留空自动取最新）'
        required: false
        type: string
      create_release:
        description: '是否创建Release'
        required: true
        default: true
        type: boolean

env:
  PYTHON_VERSION: "3.10"
  PROJECT_NAME: "ad"

jobs:
# ========================
# 版本 + Changelog
# ========================
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
      notes: ${{ steps.changelog.outputs.notes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
              TAG="${{ github.event.inputs.tag_name }}"
            else
              TAG=$(git tag -l "v*" --sort=-v:refname | head -n1)
            fi
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - id: ver
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -A1 "^$TAG$" | tail -n1)

          if [[ -z "$PREV" || "$PREV" == "$TAG" ]]; then
            NOTES=$(git log --pretty=format:"- %s" -n 20)
          else
            NOTES=$(git log "$PREV..$TAG" --pretty=format:"- %s")
          fi

          NOTES_ESCAPED="${NOTES//'%'/'%25'}"
          NOTES_ESCAPED="${NOTES_ESCAPED//$'\n'/'%0A'}"
          NOTES_ESCAPED="${NOTES_ESCAPED//$'\r'/'%0D'}"

          echo "notes=$NOTES_ESCAPED" >> $GITHUB_OUTPUT

# ========================
# 构建（PyInstaller 稳定版）
# ========================
  build:
    needs: meta
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ✅ PyInstaller 打包为文件夹
      - name: PyInstaller 打包（非 onefile）
        shell: bash
        run: |
          OUT_NAME="${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}"
          pyinstaller main.py \
            --name "$OUT_NAME" \
            --distpath build \
            --workpath build/temp \
            --specpath build/spec \
            --noconfirm \
            --console \
            --onedir

      # ✅ 打包目录为 zip
      - name: 压缩构建产物
        shell: bash
        run: |
          cd build
          NAME="${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}"
          mv "$NAME" "$NAME"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell Compress-Archive -Path "$NAME" -DestinationPath "$NAME.zip"
          else
            zip -r "$NAME.zip" "$NAME"
          fi
          mv "$NAME.zip" ..

      - name: 生成 SHA256
        shell: bash
        run: |
          FILE="${{ env.PROJECT_NAME }}-${{ matrix.name }}-${{ needs.meta.outputs.version }}.zip"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            certutil -hashfile "$FILE" SHA256 > tmp.txt
            tail -n 1 tmp.txt > "$FILE.sha256"
          else
            shasum -a 256 "$FILE" > "$FILE.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            *.zip
            *.sha256

# ========================
# Release
# ========================
  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理文件
        run: |
          mkdir release
          find artifacts -type f -exec mv {} release/ \;
          ls -lh release

      - name: 发布 Release（自动覆盖）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          VERSION="${{ needs.meta.outputs.version }}"
          NOTES="${{ needs.meta.outputs.notes }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "Release $VERSION" \
              --notes "$NOTES"
          else
            gh release create "$TAG" \
              --title "Release $VERSION" \
              --notes "$NOTES"
          fi

          gh release upload "$TAG" ./release/* --clobber
