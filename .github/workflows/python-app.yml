name: 构建并发布可执行文件

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: '选择要构建的标签（留空则使用最新标签）'
        required: false
        type: string
      create_release:
        description: '是否创建Release'
        required: true
        default: true
        type: boolean
      prerelease:
        description: '是否为预发布版本'
        required: true
        default: false
        type: boolean

jobs:
  get-version:
    name: 获取版本信息
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag_name: ${{ steps.get_tag.outputs.tag_name }}
      release_notes: ${{ steps.changelog.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 获取标签名
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.tag_name }}" ]; then
              TAG_NAME="${{ github.event.inputs.tag_name }}"
            else
              TAG_NAME=$(git tag -l "v*" --sort=-v:refname | head -n1)
              if [ -z "$TAG_NAME" ]; then
                echo "错误：没有找到v*标签"
                exit 1
              fi
            fi
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "使用的标签: $TAG_NAME"
      
      - name: 检出指定标签
        run: |
          git checkout ${{ steps.get_tag.outputs.tag_name }}
      
      - name: 提取版本号
        id: extract
        run: |
          VERSION="${{ steps.get_tag.outputs.tag_name }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"
      
      - name: 从CHANGELOG提取更新日志
        id: changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            NOTES=$(awk -v ver="${{ steps.extract.outputs.version }}" '
              BEGIN { flag=0 }
              /^## / {
                if ($0 ~ ver || $0 ~ "v" ver) flag=1; 
                else if (flag) exit
              }
              flag { print }
            ' CHANGELOG.md)
            
            if [ -z "$NOTES" ]; then
              NOTES="暂无更新说明"
            fi
            
            # 将多行文本转换为单行
            NOTES_ESCAPED="${NOTES//'%'/'%25'}"
            NOTES_ESCAPED="${NOTES_ESCAPED//$'\n'/'%0A'}"
            NOTES_ESCAPED="${NOTES_ESCAPED//$'\r'/'%0D'}"
            
            echo "release_notes=$NOTES_ESCAPED" >> $GITHUB_OUTPUT
          else
            echo "release_notes=暂无更新说明" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: Windows构建
    runs-on: windows-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.get-version.outputs.tag_name }}
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-windows-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 生成SHA256校验和
      shell: powershell
      run: |
        cd dist
        $fileName = "ad-windows-${{ needs.get-version.outputs.version }}.exe"
        $hash = Get-FileHash $fileName -Algorithm SHA256
        "$($hash.Hash.ToLower())  $fileName" | Out-File -FilePath "$fileName.sha256" -Encoding utf8
        Get-Content "$fileName.sha256"
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          dist/ad-windows-${{ needs.get-version.outputs.version }}.exe
          dist/ad-windows-${{ needs.get-version.outputs.version }}.exe.sha256
  
  build-linux:
    name: Linux构建
    runs-on: ubuntu-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.get-version.outputs.tag_name }}
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-linux-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 生成SHA256校验和
      run: |
        cd dist
        sha256sum "ad-linux-${{ needs.get-version.outputs.version }}" > "ad-linux-${{ needs.get-version.outputs.version }}.sha256"
        cat "ad-linux-${{ needs.get-version.outputs.version }}.sha256"
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: |
          dist/ad-linux-${{ needs.get-version.outputs.version }}
          dist/ad-linux-${{ needs.get-version.outputs.version }}.sha256
  
  build-macos:
    name: macOS构建
    runs-on: macos-latest
    needs: get-version
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.get-version.outputs.tag_name }}
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 用PyInstaller打包
      run: |
        pyinstaller --onefile --name "ad-macos-${{ needs.get-version.outputs.version }}" main.py
    
    - name: 生成SHA256校验和
      run: |
        cd dist
        shasum -a 256 "ad-macos-${{ needs.get-version.outputs.version }}" > "ad-macos-${{ needs.get-version.outputs.version }}.sha256"
        cat "ad-macos-${{ needs.get-version.outputs.version }}.sha256"
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: |
          dist/ad-macos-${{ needs.get-version.outputs.version }}
          dist/ad-macos-${{ needs.get-version.outputs.version }}.sha256
  
  upload-to-release:
    name: 上传到Release
    needs: [get-version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      (github.event_name == 'push') || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    
    steps:
    - name: 创建发布目录
      run: mkdir -p release_files
    
    - name: 下载Windows构建
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: release_files/
    
    - name: 下载Linux构建
      uses: actions/download-artifact@v4
      with:
        name: linux-build
        path: release_files/
    
    - name: 下载macOS构建
      uses: actions/download-artifact@v4
      with:
        name: macos-build
        path: release_files/
    
    - name: 查看下载的文件
      run: |
        echo "=== 下载的文件列表 ==="
        ls -la release_files/
        echo ""
        echo "=== 文件大小 ==="
        du -sh release_files/*
    
    - name: 设置文件权限
      run: |
        chmod +x release_files/ad-linux-* release_files/ad-macos-* 2>/dev/null || true
        echo "文件权限设置完成"
    
    - name: 创建校验和汇总文件
      run: |
        cd release_files
        echo "# SHA256 Checksums" > checksums.txt
        echo "生成时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> checksums.txt
        echo "" >> checksums.txt
        
        for file in ad-*; do
          if [ -f "$file" ] && [[ ! "$file" == *.sha256 ]] && [[ ! "$file" == "checksums.txt" ]]; then
            if [ -f "$file.sha256" ]; then
              cat "$file.sha256" >> checksums.txt
            else
              sha256sum "$file" >> checksums.txt
            fi
          fi
        done
        
        echo ""
        echo "校验和汇总文件内容："
        cat checksums.txt
    
    - name: 上传到Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ needs.get-version.outputs.version }}
        tag_name: ${{ needs.get-version.outputs.tag_name }}
        body: |
          ## 🎉 ${{ github.event_name == 'workflow_dispatch' && '手动构建' || '自动构建' }}的Release v${{ needs.get-version.outputs.version }}
          
          ### 📦 下载文件
          | 文件 | 平台 | 校验文件 |
          |------|------|----------|
          | `ad-windows-${{ needs.get-version.outputs.version }}.exe` | Windows | `ad-windows-${{ needs.get-version.outputs.version }}.exe.sha256` |
          | `ad-linux-${{ needs.get-version.outputs.version }}` | Linux | `ad-linux-${{ needs.get-version.outputs.version }}.sha256` |
          | `ad-macos-${{ needs.get-version.outputs.version }}` | macOS | `ad-macos-${{ needs.get-version.outputs.version }}.sha256` |
          
          ### 🔍 校验文件完整性
          所有文件都提供了SHA256校验和，您可以使用以下命令验证：
          
          **Windows (PowerShell):**
          ```powershell
          Get-FileHash ad-windows-${{ needs.get-version.outputs.version }}.exe -Algorithm SHA256
